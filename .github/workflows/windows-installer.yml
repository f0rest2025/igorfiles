name: Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows 11 installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read project version
        shell: pwsh
        run: |
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pyinstaller

      - name: Run smoke tests
        shell: pwsh
        run: pytest -q

      - name: Build desktop executable
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --name YandexStorageManager `
            --collect-all boto3 `
            --collect-all botocore `
            --collect-all s3transfer `
            --hidden-import app.desktop `
            --hidden-import app.client_page `
            --hidden-import cryptography.fernet `
            app\__main__.py

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DAppVersion="$env:APP_VERSION" `
            installer\windows.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: YandexStorageManagerSetup-${{ env.APP_VERSION }}
          path: dist/installer/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem dist\installer\*.exe | Select-Object -First 1
          gh release create $env:GITHUB_REF_NAME `
            $installer.FullName `
            --title $env:GITHUB_REF_NAME `
            --notes "Windows 11 installer for Yandex Object Storage Manager."

